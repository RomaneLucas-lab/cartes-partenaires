<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Analytics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:13px}
#hdr{background:#fff;border-bottom:1px solid #e8e8e4;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
#hdr h1{font-size:15px;font-weight:600;margin-right:auto}
#hdr select,#hdr input[type=date]{font-size:12px;padding:5px 10px;border:1px solid #ddd;border-radius:8px;background:#f8f8f6;outline:none;color:#1a1a1a}
.expbtn{font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-weight:500}
.expbtn.green{background:#1D9E75;color:#fff;border-color:#1D9E75}
.expbtn.green:hover{background:#178a63}
.content{padding:20px;max-width:1200px;margin:0 auto}

/* KPI bar */
.kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:14px 16px}
.kpi .top{font-size:11px;color:#aaa;margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.kpi .val{font-size:22px;font-weight:700;margin-bottom:4px}
.kpi .sub{font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi.s .val{color:#7F77DD}
.kpi.c .val{color:#1D9E75}
.kpi.m .val{color:#BA7517}
.kpi.l .val{color:#D85A30}

/* Tabs */
.tabs{display:flex;gap:0;background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden;margin-bottom:16px}
.tab{flex:1;padding:10px 14px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#aaa;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#7F77DD;border-bottom-color:#7F77DD;background:#faf9ff}
.tab:hover:not(.active){color:#555;background:#f8f8f6}

/* Table */
.tbl-wrap{background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden}
.tbl-head{padding:10px 16px;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;gap:10px}
#tbl-search{font-size:12px;padding:5px 10px;border:1px solid #ddd;border-radius:8px;outline:none;width:200px}
#tbl-count{font-size:12px;color:#aaa;margin-left:auto}
.tbl-scroll{overflow-x:auto;max-height:520px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafaf8;padding:8px 12px;text-align:left;font-weight:600;color:#888;border-bottom:1px solid #f0f0ee;position:sticky;top:0;white-space:nowrap}
td{padding:7px 12px;border-bottom:1px solid #f5f5f3;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:1px 7px;border-radius:6px;font-size:11px;font-weight:600}
.bs{background:#EEEDFE;color:#534AB7}
.bc{background:#E1F5EE;color:#0F6E56}
.bm{background:#FFF8E1;color:#854F0B}
.bl{background:#FAECE7;color:#993C1D}
.var{font-size:11px;color:#aaa;margin-left:4px}
.tbl-footer{padding:8px 16px;border-top:1px solid #f0f0ee;display:flex;justify-content:space-between;align-items:center}
.exp-tab{font-size:12px;color:#1D9E75;cursor:pointer;font-weight:500;background:none;border:none;padding:0}

/* Loader */
#loader{text-align:center;padding:40px;color:#aaa;font-size:13px}
</style>
</head>
<body>

<div id="hdr">
  <h1>&#128202; Dashboard Analytics</h1>
  <select id="f-prog"><option value="">Tous les programmes</option></select>
  <input type="date" id="f-from"/>
  <input type="date" id="f-to"/>
  <button class="expbtn" onclick="applyFilters()">Appliquer</button>
  <button class="expbtn green" onclick="exportCurrentTab()">&#8595; Export CSV</button>
</div>

<div class="content">

  <div class="kpi-bar">
    <div class="kpi s">
      <div class="top">Recherches</div>
      <div class="val" id="k-s">—</div>
      <div class="sub" id="k-s-top">—</div>
    </div>
    <div class="kpi c">
      <div class="top">Clics offre</div>
      <div class="val" id="k-c">—</div>
      <div class="sub" id="k-c-top">—</div>
    </div>
    <div class="kpi m">
      <div class="top">Clics marqueur</div>
      <div class="val" id="k-m">—</div>
      <div class="sub" id="k-m-top">—</div>
    </div>
    <div class="kpi l">
      <div class="top">Localisations</div>
      <div class="val" id="k-l">—</div>
      <div class="sub" id="k-l-top">—</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('s')">&#128269; Recherches</button>
    <button class="tab" onclick="switchTab('c')">&#128155; Clics offre</button>
    <button class="tab" onclick="switchTab('m')">&#128205; Clics marqueur</button>
    <button class="tab" onclick="switchTab('l')">&#128507; Localisations</button>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-head">
      <input type="text" id="tbl-search" placeholder="Rechercher dans le tableau..." oninput="filterTable()"/>
      <span id="tbl-count"></span>
    </div>
    <div class="tbl-scroll">
      <div id="loader">Chargement...</div>
      <table id="main-table" style="display:none"><thead id="t-head"></thead><tbody id="t-body"></tbody></table>
    </div>
    <div class="tbl-footer">
      <span id="tbl-footer-count" style="font-size:12px;color:#aaa"></span>
      <button class="exp-tab" onclick="exportCurrentTab()">&#8595; Exporter cet onglet en CSV</button>
    </div>
  </div>

</div>

<script>
var SB_URL='https://hfxpobmdolslwjrygaww.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmeHBvYm1kb2xzbHdqcnlnYXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzM0MzcsImV4cCI6MjA5NTQ0OTQzN30.4cneDKHlJQmUCsJZ_LRNLNqHMmcZAZ-ykyBQQyx4kOs';
var SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

var DEPT_NAMES={"01":"Ain","02":"Aisne","03":"Allier","04":"Alpes-de-Haute-Provence","05":"Hautes-Alpes","06":"Alpes-Maritimes","07":"Ardèche","08":"Ardennes","09":"Ariège","10":"Aube","11":"Aude","12":"Aveyron","13":"Bouches-du-Rhône","14":"Calvados","15":"Cantal","16":"Charente","17":"Charente-Maritime","18":"Cher","19":"Corrèze","2A":"Corse-du-Sud","2B":"Haute-Corse","21":"Côte-d'Or","22":"Côtes-d'Armor","23":"Creuse","24":"Dordogne","25":"Doubs","26":"Drôme","27":"Eure","28":"Eure-et-Loir","29":"Finistère","30":"Gard","31":"Haute-Garonne","32":"Gers","33":"Gironde","34":"Hérault","35":"Ille-et-Vilaine","36":"Indre","37":"Indre-et-Loire","38":"Isère","39":"Jura","40":"Landes","41":"Loir-et-Cher","42":"Loire","43":"Haute-Loire","44":"Loire-Atlantique","45":"Loiret","46":"Lot","47":"Lot-et-Garonne","48":"Lozère","49":"Maine-et-Loire","50":"Manche","51":"Marne","52":"Haute-Marne","53":"Mayenne","54":"Meurthe-et-Moselle","55":"Meuse","56":"Morbihan","57":"Moselle","58":"Nièvre","59":"Nord","60":"Oise","61":"Orne","62":"Pas-de-Calais","63":"Puy-de-Dôme","64":"Pyrénées-Atlantiques","65":"Hautes-Pyrénées","66":"Pyrénées-Orientales","67":"Bas-Rhin","68":"Haut-Rhin","69":"Rhône","70":"Haute-Saône","71":"Saône-et-Loire","72":"Sarthe","73":"Savoie","74":"Haute-Savoie","75":"Paris","76":"Seine-Maritime","77":"Seine-et-Marne","78":"Yvelines","79":"Deux-Sèvres","80":"Somme","81":"Tarn","82":"Tarn-et-Garonne","83":"Var","84":"Vaucluse","85":"Vendée","86":"Vienne","87":"Haute-Vienne","88":"Vosges","89":"Yonne","90":"Territoire de Belfort","91":"Essonne","92":"Hauts-de-Seine","93":"Seine-Saint-Denis","94":"Val-de-Marne","95":"Val-d'Oise","971":"Guadeloupe","972":"Martinique","973":"Guyane","974":"La Réunion","976":"Mayotte"};

var allSearches=[],allClicks=[],allMarkers=[],allLocs=[];
var currentTab='s';
var currentRows=[];

// ── Regroupement recherches ──
function normalizeQ(s){return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');}
function stemQ(s){return s.replace(/ux$/,'l').replace(/aux$/,'al').replace(/s$/,'').replace(/es$/,'').replace(/tion$/,'').replace(/ment$/,'');}
function levenshtein(a,b){if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;var m=a.length,n=b.length,dp=[],i,j;for(i=0;i<=m;i++){dp[i]=[i];for(j=1;j<=n;j++)dp[i][j]=0;}for(j=0;j<=n;j++)dp[0][j]=j;for(i=1;i<=m;i++)for(j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}return dp[m][n];}
function areClose(a,b){var na=normalizeQ(a),nb=normalizeQ(b);if(na===nb)return true;if(stemQ(na)===stemQ(nb))return true;var s=na.length<nb.length?na:nb,l=na.length<nb.length?nb:na;if(s.length>=3&&l.indexOf(s)===0)return true;var mx=Math.max(na.length,nb.length);if(mx>=4&&levenshtein(na,nb)<=Math.floor(mx*0.25))return true;return false;}
function groupTerms(terms){var entries=Object.entries(terms).sort(function(a,b){return b[1].count-a[1].count;});var groups=[],assigned=new Set(),i,j;for(i=0;i<entries.length;i++){if(assigned.has(entries[i][0]))continue;var label=entries[i][0],g={label:label,count:entries[i][1].count,variants:[label],progs:Object.assign({},entries[i][1].progs)};for(j=i+1;j<entries.length;j++){if(assigned.has(entries[j][0]))continue;if(areClose(label,entries[j][0])){g.count+=entries[j][1].count;g.variants.push(entries[j][0]);Object.keys(entries[j][1].progs).forEach(function(p){g.progs[p]=(g.progs[p]||0)+entries[j][1].progs[p];});assigned.add(entries[j][0]);}}assigned.add(label);g.label=g.variants.reduce(function(best,v){return v.length>best.length?v:best;},g.variants[0]);g.variants=[g.label].concat(g.variants.filter(function(v){return v!==g.label;}));groups.push(g);}return groups.sort(function(a,b){return b.count-a.count;});}

async function safeJson(resp){try{var d=await resp.json();return Array.isArray(d)?d:[];}catch(e){return[];}}

async function loadAll(){
  var r=await Promise.all([
    fetch(SB_URL+'/rest/v1/search_logs?select=programme,query,searched_at&order=searched_at.desc&limit=10000',{headers:SB_H}),
    fetch(SB_URL+'/rest/v1/offer_clicks?select=programme,offer_name,offer_address,clicked_at&order=clicked_at.desc&limit=10000',{headers:SB_H}),
    fetch(SB_URL+'/rest/v1/marker_clicks?select=programme,offer_name,offer_category,offer_subcategory,offer_address,offer_city,clicked_at&order=clicked_at.desc&limit=10000',{headers:SB_H}),
    fetch(SB_URL+'/rest/v1/loc_clicks?select=programme,lat,lng,city,department,department_num,region,clicked_at&order=clicked_at.desc&limit=10000',{headers:SB_H}).catch(function(){return new Response('[]');})
  ]);
  allSearches=await safeJson(r[0]);
  allClicks=await safeJson(r[1]);
  allMarkers=await safeJson(r[2]);
  allLocs=await safeJson(r[3]);

  // Charger programmes
  fetch(SB_URL+'/rest/v1/programmes?select=name&order=name',{headers:SB_H}).then(function(r){return r.json();}).then(function(d){
    var sel=document.getElementById('f-prog');
    (d||[]).forEach(function(p){var o=document.createElement('option');o.value=p.name;o.textContent=p.name;sel.appendChild(o);});
  }).catch(function(){});

  document.getElementById('loader').style.display='none';
  document.getElementById('main-table').style.display='table';
  applyFilters();
}

function getFiltered(){
  var prog=document.getElementById('f-prog').value;
  var from=document.getElementById('f-from').value;
  var to=document.getElementById('f-to').value;
  function filt(arr,dateField){
    return arr.filter(function(d){
      if(prog&&d.programme!==prog)return false;
      var dt=(d[dateField]||'').slice(0,10);
      if(from&&dt<from)return false;
      if(to&&dt>to)return false;
      return true;
    });
  }
  return{
    searches:filt(allSearches,'searched_at'),
    clicks:filt(allClicks,'clicked_at'),
    markers:filt(allMarkers,'clicked_at'),
    locs:filt(allLocs,'clicked_at')
  };
}

function applyFilters(){
  var f=getFiltered();
  updateKPIs(f);
  renderTab(currentTab,f);
}

function updateKPIs(f){
  // Recherches
  var terms={};
  f.searches.forEach(function(d){var q=(d.query||'').toLowerCase().trim();if(!q)return;if(!terms[q])terms[q]={count:0,progs:{}};terms[q].count++;terms[q].progs[d.programme]=(terms[q].progs[d.programme]||0)+1;});
  var gs=groupTerms(terms);
  document.getElementById('k-s').textContent=f.searches.length;
  document.getElementById('k-s-top').textContent=gs.length?'Top: '+gs[0].label+' ('+gs[0].count+')':'—';

  // Clics offre
  var byC={};
  f.clicks.forEach(function(d){var n=d.offer_name||'?';byC[n]=(byC[n]||0)+1;});
  var topC=Object.entries(byC).sort(function(a,b){return b[1]-a[1];});
  document.getElementById('k-c').textContent=f.clicks.length;
  document.getElementById('k-c-top').textContent=topC.length?'Top: '+topC[0][0]+' ('+topC[0][1]+')':'—';

  // Clics marqueur
  var byM={};
  f.markers.forEach(function(d){var n=d.offer_name||'?';byM[n]=(byM[n]||0)+1;});
  var topM=Object.entries(byM).sort(function(a,b){return b[1]-a[1];});
  document.getElementById('k-m').textContent=f.markers.length;
  document.getElementById('k-m-top').textContent=topM.length?'Top: '+topM[0][0]+' ('+topM[0][1]+')':'—';

  // Localisations
  var byL={};
  f.locs.forEach(function(d){var c=d.city||'?';byL[c]=(byL[c]||0)+1;});
  var topL=Object.entries(byL).sort(function(a,b){return b[1]-a[1];});
  document.getElementById('k-l').textContent=f.locs.length;
  document.getElementById('k-l-top').textContent=topL.length?'Top: '+topL[0][0]+' ('+topL[0][1]+')':'—';
}

function fmtDate(iso){return iso?(iso.slice(0,10)):'—';}
function esc(v){return(v||'').toString().replace(/</g,'&lt;');}

function renderTab(tab,f){
  f=f||getFiltered();
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',['s','c','m','l'][i]===tab);});
  var head=document.getElementById('t-head');
  var body=document.getElementById('t-body');
  var rows=[];

  if(tab==='s'){
    head.innerHTML='<tr><th>Date</th><th>Programme</th><th>Terme</th><th>Variantes</th></tr>';
    // Build varMap
    var terms={};
    f.searches.forEach(function(d){var q=(d.query||'').toLowerCase().trim();if(!q)return;if(!terms[q])terms[q]={count:0,progs:{}};terms[q].count++;terms[q].progs[d.programme]=(terms[q].progs[d.programme]||0)+1;});
    var varMap={};
    groupTerms(terms).forEach(function(g){g.variants.forEach(function(v){varMap[v]=g;});});
    f.searches.forEach(function(d){
      var q=(d.query||'').toLowerCase().trim();if(!q)return;
      var g=varMap[q]||{label:q,variants:[q]};
      var others=g.variants.filter(function(v){return v!==g.label;});
      rows.push({date:fmtDate(d.searched_at),prog:d.programme||'',terme:g.label,variantes:others.join(', '),_raw:[fmtDate(d.searched_at),d.programme||'',g.label,others.join(', ')]});
    });
    currentRows=rows;
    body.innerHTML=rows.map(function(r){
      return '<tr><td>'+esc(r.date)+'</td><td><span class="badge bs">'+esc(r.prog)+'</span></td><td><b>'+esc(r.terme)+'</b>'+(r.variantes?'<span class="var">('+esc(r.variantes)+')</span>':'')+'</td><td style="color:#aaa">'+esc(r.variantes)+'</td></tr>';
    }).join('');
  }

  else if(tab==='c'){
    head.innerHTML='<tr><th>Date</th><th>Programme</th><th>Offre cliquée</th><th>Adresse</th></tr>';
    f.clicks.forEach(function(d){
      rows.push({date:fmtDate(d.clicked_at),prog:d.programme||'',offre:d.offer_name||'',adresse:d.offer_address||'',_raw:[fmtDate(d.clicked_at),d.programme||'',d.offer_name||'',d.offer_address||'']});
    });
    currentRows=rows;
    body.innerHTML=rows.map(function(r){
      return '<tr><td>'+esc(r.date)+'</td><td><span class="badge bc">'+esc(r.prog)+'</span></td><td><b>'+esc(r.offre)+'</b></td><td style="color:#888">'+esc(r.adresse)+'</td></tr>';
    }).join('');
  }

  else if(tab==='m'){
    head.innerHTML='<tr><th>Date</th><th>Programme</th><th>Offre</th><th>Catégorie</th><th>Adresse</th></tr>';
    f.markers.forEach(function(d){
      rows.push({date:fmtDate(d.clicked_at),prog:d.programme||'',offre:d.offer_name||'',cat:d.offer_category||'',adresse:d.offer_address||'',_raw:[fmtDate(d.clicked_at),d.programme||'',d.offer_name||'',d.offer_category||'',d.offer_address||'']});
    });
    currentRows=rows;
    body.innerHTML=rows.map(function(r){
      return '<tr><td>'+esc(r.date)+'</td><td><span class="badge bm">'+esc(r.prog)+'</span></td><td><b>'+esc(r.offre)+'</b></td><td style="color:#888">'+esc(r.cat)+'</td><td style="color:#aaa">'+esc(r.adresse)+'</td></tr>';
    }).join('');
  }

  else if(tab==='l'){
    head.innerHTML='<tr><th>Date</th><th>Programme</th><th>Ville</th><th>N° dept</th><th>Département</th><th>Région</th></tr>';
    f.locs.forEach(function(d){
      var num=d.department_num||'';
      var nom=DEPT_NAMES[num]||d.department||'';
      rows.push({date:fmtDate(d.clicked_at),prog:d.programme||'',city:d.city||'',num:num,nom:nom,region:d.region||'',_raw:[fmtDate(d.clicked_at),d.programme||'',d.city||'',num,nom,d.region||'']});
    });
    currentRows=rows;
    body.innerHTML=rows.map(function(r){
      return '<tr><td>'+esc(r.date)+'</td><td><span class="badge bl">'+esc(r.prog)+'</span></td><td><b>'+esc(r.city)+'</b></td><td style="color:#888">'+esc(r.num)+'</td><td>'+esc(r.nom)+'</td><td style="color:#aaa">'+esc(r.region)+'</td></tr>';
    }).join('');
  }

  document.getElementById('tbl-search').value='';
  updateCount(rows.length,rows.length);
}

function switchTab(tab){renderTab(tab);}

function filterTable(){
  var q=document.getElementById('tbl-search').value.toLowerCase();
  var rows=document.getElementById('t-body').querySelectorAll('tr');
  var visible=0;
  rows.forEach(function(tr){
    var txt=tr.textContent.toLowerCase();
    var show=!q||txt.indexOf(q)>=0;
    tr.style.display=show?'':'none';
    if(show)visible++;
  });
  updateCount(visible,currentRows.length);
}

function updateCount(vis,total){
  document.getElementById('tbl-count').textContent=vis===total?total+' lignes':vis+' / '+total+' lignes';
  document.getElementById('tbl-footer-count').textContent=vis===total?total+' lignes':vis+' / '+total+' lignes';
}

function exportCurrentTab(){
  var labels={'s':'recherches','c':'clics_offre','m':'clics_marqueur','l':'localisations'};
  var heads={'s':'Date;Programme;Terme;Variantes','c':'Date;Programme;Offre;Adresse','m':'Date;Programme;Offre;Catégorie;Adresse','l':'Date;Programme;Ville;N° département;Nom département;Région'};
  var csvRows=['sep=;',heads[currentTab]];
  var q=document.getElementById('tbl-search').value.toLowerCase();
  currentRows.forEach(function(r){
    if(q){var txt=r._raw.join(' ').toLowerCase();if(txt.indexOf(q)<0)return;}
    csvRows.push(r._raw.map(function(v){return '"'+(v||'').replace(/"/g,'""')+'"';}).join(';'));
  });
  var prog=document.getElementById('f-prog').value||'tous';
  var date=new Date().toISOString().slice(0,10);
  var content=csvRows.join('\n');
  var bytes=[];
  for(var i=0;i<content.length;i++){var c=content.charCodeAt(i);bytes.push(c<256?c:63);}
  var blob=new Blob([new Uint8Array(bytes)],{type:'text/csv;charset=windows-1252;'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=labels[currentTab]+'_'+prog+'_'+date+'.csv';
  a.click();
}

loadAll();
</script>
</body>
</html>
